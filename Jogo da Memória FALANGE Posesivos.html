<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <!-- =========================================================
       JOGO DA MEMÓRIA FALANGE — POSESIVOS (TESTAMENTO)
       PARES:
         (1) Emoji + Personagem
         (2) Somente o Posesivo (mi/mis/tu/tus/su/sus/nuestra...)
       OBJETIVO:
         Associar cada personagem ao posesivo usado no testamento.
  ========================================================== -->

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jogo da Memória FALANGE — Posesivos</title>

  <!-- Fonte + Tailwind (igual ao seu modelo) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    /* =========================================================
       [INÍCIO] 0) DESIGN SYSTEM (cores Falange)
    ========================================================== */
    :root{
      --falange-dark:#1A1C3C;
      --falange-cyan:#00BFFF;
      --falange-orange:#FF8C00;
      --falange-card-face:#1E3A8A;
      --falange-card-back:#4f8287;
      --falange-matched:#10B981;
      --falange-red:#E74C3C;
      --falange-ink:#ffffff;
    }

    body{
      background: var(--falange-dark);
      font-family:'Inter',sans-serif;
      color: var(--falange-ink);
    }

    .title-h1{
      color: var(--falange-ink);
      text-shadow: 4px 4px 0px var(--falange-cyan);
      letter-spacing: 2px;
      font-weight: 900;
      text-transform: uppercase;
    }

    /* =========================================================
       [INÍCIO] 1) CARTAS (flip 3D) — CORRIGIDO
       - O bug “algumas abrem, outras não” geralmente vem de:
         (a) falta de perspective no "pai" (3D)
         (b) falta de position:relative no container interno
         (c) faces sem top/left 0 (não ocupam tudo)
    ========================================================== */

    /* área quadrada responsiva */
    .card-container{
      width:100%;
      padding-top:100%;
      position:relative;
      perspective: 1000px; /* IMPORTANTÍSSIMO: dá o 3D estável */
    }

    /* carta ocupando o quadrado */
    .card{
      position:absolute;
      inset:0;
      cursor:pointer;
      user-select:none;
    }

    /* "miolo" que gira */
    .card-inner{
      width:100%;
      height:100%;
      position:relative;          /* IMPORTANTÍSSIMO */
      transform-style:preserve-3d;/* IMPORTANTÍSSIMO */
      transition: transform .55s ease;
    }

    /* quando flipada, gira */
    .card.flipped .card-inner{
      transform: rotateY(180deg);
    }

    /* as duas faces */
    .card-front,.card-back{
      position:absolute;
      inset:0;                  /* top:0; left:0; right:0; bottom:0 */
      backface-visibility:hidden;
      border:4px solid var(--falange-cyan);
      box-shadow:6px 6px 0px var(--falange-orange);
      border-radius:12px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      overflow:hidden;
    }

    .card-front{
      background: var(--falange-card-back);
      font-weight: 900;
      font-size: clamp(0.9rem, 3vw, 1.15rem);
    }

    .card-back{
      transform: rotateY(180deg);
      background: var(--falange-card-face);
      padding: 10px;
      font-weight: 900;
      font-size: clamp(0.95rem, 3vw, 1.25rem);
      letter-spacing: .5px;
    }

    /* estado "matched" */
    .card.matched .card-front,
    .card.matched .card-back{
      border-color: var(--falange-matched);
      box-shadow: 6px 6px 0px var(--falange-matched);
      opacity: .85;
      cursor: default;
    }

    /* botão */
    #restart-button{
      background: var(--falange-red);
      border:4px solid white;
      box-shadow:4px 4px 0px var(--falange-cyan);
      font-weight:900;
      letter-spacing:2px;
      text-transform: uppercase;
      transition: transform .08s ease;
    }
    #restart-button:hover{
      transform: translateY(2px) translateX(2px);
      box-shadow:2px 2px 0px var(--falange-cyan);
    }

    /* texto da carta “emoji + nome” */
    .who{
      display:flex;
      flex-direction:column;
      gap:8px;
      align-items:center;
      justify-content:center;
      line-height:1.1;
    }
    .who .emoji{
      font-size: clamp(1.8rem, 6vw, 2.6rem);
    }
    .who .name{
      font-size: clamp(.85rem, 3vw, 1.05rem);
      font-weight: 900;
    }
  </style>
</head>

<body class="min-h-screen flex flex-col items-center p-4">

  <!-- =========================================================
       [INÍCIO] CABEÇALHO
  ========================================================== -->
  <header class="text-center mb-6 max-w-6xl w-full">
    <h1 class="title-h1 text-3xl sm:text-4xl mb-3">
      Jogo da Memória — Posesivos del Testamento
    </h1>
    <p class="text-base sm:text-lg font-bold opacity-90">
      Encuentra el par: <span class="underline">personaje</span> ↔ <span class="underline">posesivo</span>
    </p>
  </header>
  <!-- =========================================================
       [FIM] CABEÇALHO
  ========================================================== -->

  <!-- =========================================================
       [INÍCIO] TABULEIRO
  ========================================================== -->
  <div id="game-board"
       class="grid grid-cols-3 sm:grid-cols-4 lg:grid-cols-6 gap-3 w-full max-w-6xl">
  </div>

  <p id="message" class="mt-6 text-xl font-black min-h-8"></p>

  <button id="restart-button" class="px-6 py-3 rounded-lg mt-4" style="display:none;">
    Reiniciar
  </button>
  <!-- =========================================================
       [FIM] TABULEIRO
  ========================================================== -->

  <script>
    /* =========================================================
       [INÍCIO] 2) LÓGICA DO JOGO
       - 1) Monta cartas (duas por par)
       - 2) Embaralha
       - 3) Renderiza
       - 4) Controla flips e compara matchId
    ========================================================== */

    document.addEventListener("DOMContentLoaded", () => {

      /* -----------------------------
         ELEMENTOS DA TELA
      ----------------------------- */
      const gameBoard  = document.getElementById("game-board");
      const message    = document.getElementById("message");
      const restartBtn = document.getElementById("restart-button");

      /* =========================================================
         DADOS DO TESTAMENTO (PARES)
         FORMATO PEDIDO:
           - carta A: emoji + personagem
           - carta B: apenas o posesivo (sem a frase inteira)
      ========================================================== */
      const gameData = [
        { person: "Carlos",            emoji: "👨‍👦",  posesivo: "mi"       },
        { person: "Lucía",             emoji: "👧",    posesivo: "mis"      },
        { person: "Marta",             emoji: "👩",    posesivo: "tu"       },
        { person: "Andrés",            emoji: "🧑‍🔧",  posesivo: "tus"      },
        { person: "Elena",             emoji: "👵",    posesivo: "su"       },
        { person: "Tomás",             emoji: "🧒",    posesivo: "sus"      },
        { person: "Roberto y Julia",   emoji: "👫",    posesivo: "nuestro"  },
        { person: "Familia completa",  emoji: "👨‍👩‍👧‍👦", posesivo: "nuestra"  },
        { person: "Hijos de Carlos",   emoji: "👦👧",  posesivo: "nuestros" },
        { person: "Prima Isabel",      emoji: "👩‍🦰",  posesivo: "nuestras" },
        { person: "Tío Fernando",      emoji: "👨",    posesivo: "vuestro"  },
        { person: "Tía Carmen",        emoji: "👩‍🧓",  posesivo: "vuestra"  },
        { person: "Nietos mayores",    emoji: "🧑‍🎓",  posesivo: "vuestros" },
        { person: "Nietas menores",    emoji: "👧👧",  posesivo: "vuestras" }
      ];

      /* -----------------------------
         ESTADO DO JOGO
      ----------------------------- */
      let cardsArray = [];      // array com todas as cartas (duplicadas)
      let firstCard  = null;    // 1ª carta clicada
      let secondCard = null;    // 2ª carta clicada
      let lockBoard  = false;   // trava pra não clicar durante comparação
      let matches    = 0;       // quantos pares já encontrou

      /* =========================================================
         FUNÇÃO: cria HTML do "emoji + personagem"
      ========================================================== */
      function renderWhoCard(emoji, name){
        return `
          <div class="who">
            <div class="emoji">${emoji}</div>
            <div class="name">${name}</div>
          </div>
        `;
      }

      /* =========================================================
         1) CRIAR CARTAS (2 por par)
         - matchId é o índice do item no gameData
         - type ajuda caso você queira evoluir depois
      ========================================================== */
      function createCards(){
        cardsArray = [];

        gameData.forEach((item, index) => {

          // Carta A: Emoji + Personagem
          cardsArray.push({
            matchId: index,
            type: "person",
            valueHTML: renderWhoCard(item.emoji, item.person)
          });

          // Carta B: Posesivo (somente a palavra)
          cardsArray.push({
            matchId: index,
            type: "posesivo",
            valueHTML: `<span>${item.posesivo}</span>`
          });

        });

        shuffle(cardsArray);
      }

      /* =========================================================
         2) EMBARALHAR (Fisher-Yates)
      ========================================================== */
      function shuffle(array){
        for(let i = array.length - 1; i > 0; i--){
          const j = Math.floor(Math.random() * (i + 1));
          [array[i], array[j]] = [array[j], array[i]];
        }
      }

      /* =========================================================
         3) RENDERIZAR CARTAS
      ========================================================== */
      function renderCards(){
        gameBoard.innerHTML = "";

        cardsArray.forEach(cardData => {
          const container = document.createElement("div");
          container.className = "card-container";

          const card = document.createElement("div");
          card.className = "card";
          card.dataset.matchId = String(cardData.matchId);
          card.dataset.type = cardData.type;

          // Montagem do flip (faces com inset:0 e card-inner relative)
          card.innerHTML = `
            <div class="card-inner">
              <div class="card-front">?</div>
              <div class="card-back">${cardData.valueHTML}</div>
            </div>
          `;

          card.addEventListener("click", flipCard);
          container.appendChild(card);
          gameBoard.appendChild(container);
        });
      }

      /* =========================================================
         4) FLIP (clique)
      ========================================================== */
      function flipCard(){
        if(lockBoard) return;

        // evita clicar na mesma carta ou em carta já "matched"
        if(this === firstCard) return;
        if(this.classList.contains("matched")) return;

        // vira a carta
        this.classList.add("flipped");

        // se ainda não tem primeira carta, salva e sai
        if(!firstCard){
          firstCard = this;
          return;
        }

        // senão, essa é a segunda
        secondCard = this;
        lockBoard = true;
        checkMatch();
      }

      /* =========================================================
         5) CHECK MATCH
         - compara matchId das duas cartas
      ========================================================== */
      function checkMatch(){
        const isMatch = firstCard.dataset.matchId === secondCard.dataset.matchId;

        if(isMatch){
          markAsMatched();
        }else{
          unflipCards();
        }
      }

      /* =========================================================
         6) QUANDO ACERTA
      ========================================================== */
      function markAsMatched(){
        firstCard.classList.add("matched");
        secondCard.classList.add("matched");

        matches++;
        message.textContent = `Pares encontrados: ${matches}/${gameData.length}`;

        resetTurn();

        if(matches === gameData.length){
          message.textContent = "¡Excelente! Has completado el testamento.";
          restartBtn.style.display = "block";
        }
      }

      /* =========================================================
         7) QUANDO ERRA — desvira depois de um tempo
      ========================================================== */
      function unflipCards(){
        setTimeout(() => {
          firstCard.classList.remove("flipped");
          secondCard.classList.remove("flipped");
          resetTurn();
        }, 850);
      }

      /* =========================================================
         8) RESET DO TURNO
      ========================================================== */
      function resetTurn(){
        firstCard = null;
        secondCard = null;
        lockBoard = false;
      }

      /* =========================================================
         9) START / RESTART
      ========================================================== */
      function startGame(){
        matches = 0;
        resetTurn();

        restartBtn.style.display = "none";
        message.textContent = "Relaciona el personaje con el posesivo correcto.";

        createCards();
        renderCards();
      }

      restartBtn.addEventListener("click", startGame);
      startGame();
    });

    /* =========================================================
       [FIM] 2) LÓGICA DO JOGO
    ========================================================== */
  </script>
</body>
</html>
